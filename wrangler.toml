name = "ca-chatbot"
main = "worker.js"
compatibility_date = "2025-01-01"

# Workers AI — free embedding model (384 dims)
[ai]
binding = "AI"

# Vectorize — semantic vector store
[[vectorize]]
binding = "VECTORIZE"
index_name = "ca-knowledge-vectors"

# Legacy KV kept for rollback safety (can be removed after vectorize is confirmed working)
[[kv_namespaces]]
binding = "CA_KNOWLEDGE"
id = "eff3c01506c04572b76e311330700aad"
preview_id = "c5a42887f2074da38ca87a0814498ca4"

[vars]
ALLOWED_ORIGIN = "*"
