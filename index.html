<!DOCTYPE html>
<html lang="en" class="scroll-smooth dark">
<head>
  <meta charset="UTF-8">
  <title>CA Bhaiya — Your GenZ CA Mentor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content">
  <meta name="description" content="CA Bhaiya is your GenZ CA Mentor. Fast, crisp, highly accurate answers for CA Foundation, Intermediate, and Final exams." />
  <meta name="author" content="Arpit Agarwala" />
  <link rel="canonical" href="https://ca.arpitagarwala.online/" />
  <meta property="og:title" content="CA Bhaiya — Your GenZ CA Mentor" />
  <meta property="og:description" content="Get crisp, undeniable concepts for CA Foundation, Inter, and Final. Powered by Multimodal AI." />
  <meta property="og:url" content="https://ca.arpitagarwala.online" />
  <link rel="icon" type="image/png" sizes="32x32" href="logo.png">

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
  <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';</script>

  <style>
    :root {
      --bg: #09090b;
      --card: #141417;
      --accent: #6366f1;
      --accent-hover: #4f46e5;
      --text-main: #fafafa;
      --text-muted: #a1a1aa;
      --border: rgba(255, 255, 255, 0.08);
    }
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    body, html { 
      height: 100%; height: 100dvh; 
      margin: 0; padding: 0; 
      background: var(--bg); 
      color: var(--text-main);
      font-family: 'Plus Jakarta Sans', sans-serif;
      overflow: hidden;
    }

    #app {
      height: 100%; width: 100%;
      display: flex; flex-direction: column;
      position: fixed; inset: 0;
    }

    /* Pinned Header */
    header {
      flex-shrink: 0;
      background: rgba(9, 9, 11, 0.8);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      display: flex; align-items: center; justify-content: space-between;
      z-index: 100;
    }

    /* Scrollable Chat Area */
    main {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex; flex-direction: column; gap: 24px;
      scroll-behavior: smooth;
      background: linear-gradient(to bottom, transparent, rgba(99, 102, 241, 0.02));
    }

    /* Pinned Footer */
    footer {
      flex-shrink: 0;
      background: rgba(9, 9, 11, 0.85);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-top: 1px solid var(--border);
      padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
      z-index: 100;
    }

    /* Modern Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

    /* Premium Bubbles */
    .msg-in { animation: msgFade 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
    @keyframes msgFade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .user-bubble {
      background: linear-gradient(135deg, var(--accent), #8b5cf6);
      color: white; padding: 12px 18px; border-radius: 22px 22px 4px 22px;
      box-shadow: 0 4px 15px rgba(99, 102, 241, 0.2);
      max-width: 85%; align-self: flex-end; font-size: 15px; font-weight: 500;
    }

    .bot-capsule {
      display: flex; gap: 12px; max-width: 90%; align-self: flex-start;
    }
    .bot-avatar {
      width: 32px; height: 32px; border-radius: 10px; background: var(--card);
      border: 1px solid var(--border); flex-shrink: 0; overflow: hidden;
    }
    .bot-content {
      background: var(--card); border: 1px solid var(--border);
      padding: 16px; border-radius: 4px 22px 22px 22px;
      color: #e4e4e7; line-height: 1.6; font-size: 15px;
    }

    /* Bot Text Styling */
    .bot-content p { margin: 0 0 12px 0; }
    .bot-content p:last-child { margin-bottom: 0; }
    .bot-content strong { color: #fff; font-weight: 700; }
    .bot-content ul, .bot-content ol { padding-left: 20px; margin: 12px 0; }
    .bot-content li { margin-bottom: 8px; }
    .bot-content blockquote { border-left: 3px solid var(--accent); padding-left: 12px; color: var(--text-muted); margin: 12px 0; }

    /* Input Styling */
    .input-wrapper {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 24px; padding: 6px 6px 6px 14px;
      display: flex; align-items: flex-end; gap: 8px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-wrapper:focus-within {
      border-color: rgba(99, 102, 241, 0.4);
      box-shadow: 0 0 20px rgba(99, 102, 241, 0.1);
    }
    #chat-input {
      flex: 1; background: transparent; border: none; outline: none;
      color: #fff; font-size: 15px; padding: 10px 0;
      resize: none; max-height: 120px; font-family: inherit;
    }
    .send-btn {
      width: 40px; height: 40px; border-radius: 50%;
      background: var(--accent); color: white;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: transform 0.2s, background 0.2s;
      border: none; flex-shrink: 0;
    }
    .send-btn:hover { background: var(--accent-hover); transform: scale(1.05); }
    .send-btn:active { transform: scale(0.95); }

    /* Attempt Pill */
    .pill-trigger {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,0.05); border: 1px solid var(--border);
      padding: 6px 12px; border-radius: 99px;
      font-size: 12px; font-weight: 600; color: var(--text-muted);
      cursor: pointer; margin-bottom: 12px; transition: 0.2s;
    }
    .pill-trigger:hover { background: rgba(255,255,255,0.08); color: #fff; }

    /* Dropdown UI */
    .close-area { position: fixed; inset: 0; z-index: 101; }
    .drop-menu {
      position: absolute; bottom: calc(100% + 8px); left: 0; z-index: 102;
      background: #18181b; border: 1px solid var(--border);
      border-radius: 16px; padding: 12px; width: 280px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
      animation: menuSlide 0.2s ease-out;
    }
    @keyframes menuSlide { from { opacity: 0; transform: translateY(5px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
    .menu-title { font-size: 11px; font-weight: 800; color: var(--text-muted); letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 10px; padding: 0 4px; }
    .menu-item {
      display: flex; align-items: center; gap: 10px; padding: 10px;
      border-radius: 10px; cursor: pointer; transition: 0.15s;
      font-size: 14px; font-weight: 500; color: #d4d4d8; margin-bottom: 2px;
    }
    .menu-item:hover { background: rgba(255,255,255,0.04); color: #fff; }
    .menu-item.active { background: rgba(99, 102, 241, 0.1); color: var(--accent); }
    .menu-item i { font-size: 16px; width: 20px; text-align: center; }

    /* Typings & Voice */
    .typing { display: flex; gap: 4px; padding: 4px 8px; }
    .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); animation: dotPulse 1.4s infinite; opacity: 0.4; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dotPulse { 0%,100% { opacity: 0.4; transform: scale(1); } 50% { opacity: 1; transform: scale(1.1); } }

    .glow-pulse { animation: glow 1.5s infinite ease-in-out; color: #f87171 !important; }
    @keyframes glow { 0%,100% { text-shadow: 0 0 5px rgba(248,113,113,0.3); transform: scale(1); } 50% { text-shadow: 0 0 15px rgba(248,113,113,0.8); transform: scale(1.1); } }
    
    .mic-btn { color: var(--text-muted); cursor: pointer; transition: 0.2s; padding: 10px 4px; display: flex; align-items: center; justify-content: center; }
    .mic-btn:hover { color: var(--accent); }

    /* Utility */
    .hidden { display: none !important; }
    .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(10px); }
    
    @media (min-width: 640px) {
      main { padding: 40px 15%; }
      header { padding: 16px 15%; }
      footer { padding: 16px 15% 30px; }
    }
  </style>
</head>

<body>
  <div id="app">
    <header>
      <div class="flex items-center gap-3">
        <div class="bot-avatar">
          <img src="logo.png" class="w-full h-full object-cover" onerror="this.src='https://res.cloudinary.com/dxsja3wy5/image/upload/v1772863840/tab-icon.png'">
        </div>
        <div>
          <div class="text-sm font-bold text-white">CA Bhaiya</div>
          <div class="text-[10px] font-semibold text-zinc-500 uppercase tracking-widest">Exam Mentor</div>
        </div>
      </div>
      <button onclick="clearChat()" class="p-2 text-zinc-400 hover:text-white transition">
        <i class="ri-refresh-line text-lg"></i>
      </button>
    </header>

    <main id="chat-box">
      <div class="bot-capsule msg-in">
        <div class="bot-avatar">
          <img src="logo.png" class="w-full h-full object-cover" onerror="this.src='https://res.cloudinary.com/dxsja3wy5/image/upload/v1772863840/tab-icon.png'">
        </div>
        <div class="bot-content">
          <p>Hey! 👋 I'm <strong>CA Bhaiya</strong>.</p>
          <p>I'm your GenZ CA mentor. Select your <strong>exam attempt</strong> below to get started with your preparation.</p>
        </div>
      </div>
    </main>

    <div id="typing-indicator" class="hidden px-4 sm:px-[15%] pb-4">
      <div class="bot-capsule">
        <div class="bot-avatar">
          <img src="logo.png" class="w-full h-full object-cover" onerror="this.src='https://res.cloudinary.com/dxsja3wy5/image/upload/v1772863840/tab-icon.png'">
        </div>
        <div class="typing glass rounded-full">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
      </div>
    </div>

    <footer>
      <div class="relative">
        <button id="attempt-pill-btn" onclick="openAttemptModal()" class="pill-trigger">
          <i class="ri-graduation-cap-line"></i>
          <span id="pill-label">Select Attempt</span>
          <i class="ri-arrow-up-s-line opacity-50"></i>
        </button>

        <div id="attempt-menu-overlay" class="close-area hidden" onclick="closeAttemptModal()"></div>
        <div id="attempt-menu" class="drop-menu hidden">
          <div id="modal-step-1">
            <div class="menu-title">Select CA Level</div>
            <div id="level-options"></div>
          </div>
          <div id="modal-step-2" class="hidden">
            <button onclick="goBackToStep1()" class="text-[10px] font-bold text-indigo-400 flex items-center gap-1 mb-2 px-1">
              <i class="ri-arrow-left-s-line"></i> BACK TO LEVELS
            </button>
            <div class="menu-title">Exam Attempt</div>
            <div id="attempt-options"></div>
          </div>
        </div>
      </div>

      <form id="chat-form" class="input-wrapper">
        <button type="button" id="mic-btn" class="mic-btn" title="Voice Dictation">
          <i class="ri-mic-2-fill text-xl"></i>
        </button>
        <textarea id="chat-input" rows="1" placeholder="Ask anything..." autocomplete="off"></textarea>
        <button type="submit" id="send-btn" class="send-btn">
          <i class="ri-send-plane-2-fill text-lg"></i>
        </button>
      </form>
    </footer>
  </div>

  <script>
    const WORKER_URL = 'https://ca-chatbot.arpitagarwala.workers.dev';
    const EXAM_CONFIG = {
      foundation: { label: 'CA Foundation', icon: 'ri-book-open-line', badge: 'Foundation', attempts: ['Jun 2026','Mar 2026','Jan 2026','Sep 2025','Jun 2025','Mar 2025'] },
      intermediate: { label: 'CA Intermediate', icon: 'ri-building-line', badge: 'Inter', attempts: ['Sep 2026','May 2026','Jan 2026','Sep 2025','May 2025'] },
      final: { label: 'CA Final', icon: 'ri-trophy-line', badge: 'Final', attempts: ['Nov 2026','May 2026','Nov 2025','May 2025'] },
    };

    let conversationHistory = [];
    let isProcessing = false;
    let selectedLevel   = localStorage.getItem('ca_level')   || 'all';
    let selectedAttempt = localStorage.getItem('ca_attempt') || 'Latest';
    let pendingLevel = null;

    marked.setOptions({ breaks: true, gfm: true });

    const chatBox   = document.getElementById('chat-box');
    const chatForm  = document.getElementById('chat-form');
    const chatInput = document.getElementById('chat-input');
    const sendBtn   = document.getElementById('send-btn');
    const typingDiv = document.getElementById('typing-indicator');

    function updatePill() {
      const levelLabel = selectedLevel !== 'all' ? EXAM_CONFIG[selectedLevel]?.badge : null;
      const txt = levelLabel ? `${levelLabel} • ${selectedAttempt}` : (selectedAttempt !== 'Latest' ? selectedAttempt : 'Select Attempt');
      document.getElementById('pill-label').textContent = txt;
    }
    updatePill();

    function openAttemptModal() {
      pendingLevel = null;
      document.getElementById('modal-step-1').classList.remove('hidden');
      document.getElementById('modal-step-2').classList.add('hidden');
      renderLevelOptions();
      document.getElementById('attempt-menu-overlay').classList.remove('hidden');
      document.getElementById('attempt-menu').classList.remove('hidden');
    }

    function closeAttemptModal() {
      document.getElementById('attempt-menu-overlay').classList.add('hidden');
      document.getElementById('attempt-menu').classList.add('hidden');
    }

    function renderLevelOptions() {
      const container = document.getElementById('level-options');
      container.innerHTML = '';
      const allDiv = document.createElement('div');
      allDiv.className = 'menu-item' + (selectedLevel === 'all' ? ' active' : '');
      allDiv.innerHTML = `<i class="ri-apps-line"></i> All Levels`;
      allDiv.onclick = () => selectLevel('all');
      container.appendChild(allDiv);

      Object.entries(EXAM_CONFIG).forEach(([key, cfg]) => {
        const div = document.createElement('div');
        div.className = 'menu-item' + (selectedLevel === key ? ' active' : '');
        div.innerHTML = `<i class="${cfg.icon}"></i> ${cfg.label}`;
        div.onclick = () => selectLevel(key);
        container.appendChild(div);
      });
    }

    function selectLevel(levelKey) {
      if (levelKey === 'all') {
        selectedLevel = 'all';
        selectedAttempt = 'Latest';
        localStorage.setItem('ca_level', 'all');
        localStorage.setItem('ca_attempt', 'Latest');
        updatePill();
        closeAttemptModal();
        return;
      }
      pendingLevel = levelKey;
      document.getElementById('modal-step-1').classList.add('hidden');
      document.getElementById('modal-step-2').classList.remove('hidden');
      renderAttemptOptions(levelKey);
    }

    function goBackToStep1() {
      pendingLevel = null;
      document.getElementById('modal-step-1').classList.remove('hidden');
      document.getElementById('modal-step-2').classList.add('hidden');
    }

    function renderAttemptOptions(levelKey) {
      const cfg = EXAM_CONFIG[levelKey];
      const container = document.getElementById('attempt-options');
      container.innerHTML = '';
      const latestDiv = document.createElement('div');
      latestDiv.className = 'menu-item' + (selectedLevel === levelKey && selectedAttempt === 'Latest' ? ' active' : '');
      latestDiv.innerHTML = `<i class="ri-sparkling-2-line"></i> Latest Updates`;
      latestDiv.onclick = () => confirmSelection(levelKey, 'Latest');
      container.appendChild(latestDiv);

      cfg.attempts.forEach((att) => {
        const div = document.createElement('div');
        div.className = 'menu-item' + (selectedLevel === levelKey && selectedAttempt === att ? ' active' : '');
        div.innerHTML = `<i class="ri-calendar-line"></i> ${att}`;
        div.onclick = () => confirmSelection(levelKey, att);
        container.appendChild(div);
      });
    }

    function confirmSelection(levelKey, attempt) {
      selectedLevel   = levelKey;
      selectedAttempt = attempt;
      localStorage.setItem('ca_level', levelKey);
      localStorage.setItem('ca_attempt', attempt);
      updatePill();
      closeAttemptModal();
    }

    chatInput.addEventListener('input', function() { this.style.height = 'auto'; this.style.height = this.scrollHeight + 'px'; });
    chatInput.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); chatForm.dispatchEvent(new Event('submit')); } });
    
    const micBtn = document.getElementById('mic-btn');
    const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SpeechRec) {
      const rec = new SpeechRec(); rec.continuous = false; rec.interimResults = true; let isRec = false;
      micBtn.addEventListener('click', () => { if (isRec) { rec.stop(); return; } rec.start(); });
      rec.onstart = () => { isRec=true; micBtn.classList.add('glow-pulse'); chatInput.placeholder='Listening...'; };
      rec.onresult = e => { 
        let t=''; 
        for (let i=e.resultIndex;i<e.results.length;++i) if(e.results[i].isFinal) t+=e.results[i][0].transcript; 
        if(t) { 
          chatInput.value+=(chatInput.value?' ':'')+t; 
          chatInput.style.height='auto'; 
          chatInput.style.height=chatInput.scrollHeight+'px'; 
        } 
      };
      rec.onend = () => { isRec=false; micBtn.classList.remove('glow-pulse'); chatInput.placeholder='Ask anything...'; chatInput.focus(); };
    } else { micBtn.style.display='none'; }

    window.useSuggestion = t => { document.getElementById('suggestions')?.remove(); chatInput.value = t; chatForm.dispatchEvent(new Event('submit')); };

    function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
    function scrollToBottom() { requestAnimationFrame(() => chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' })); }
    function setTyping(show) { typingDiv.classList.toggle('hidden', !show); if (show) scrollToBottom(); }

    async function typeHTML(targetEl, html, speed = 7) {
      const tmp = document.createElement('div');
      tmp.innerHTML = html;
      async function typeNode(node, parent) {
        if (node.nodeType === Node.TEXT_NODE) {
          const tn = document.createTextNode('');
          parent.appendChild(tn);
          for (let i = 0; i < node.textContent.length; i++) {
            tn.textContent += node.textContent[i];
            await new Promise(r => setTimeout(r, speed));
            scrollToBottom();
          }
        } else if (node.nodeType === Node.ELEMENT_NODE) {
          const el = document.createElement(node.tagName);
          Array.from(node.attributes).forEach(a => el.setAttribute(a.name, a.value));
          parent.appendChild(el);
          if (['TABLE','PRE','HR','IMG'].includes(node.tagName)) { el.innerHTML = node.innerHTML; scrollToBottom(); }
          else { for (const child of Array.from(node.childNodes)) await typeNode(child, el); }
        }
      }
      for (const root of Array.from(tmp.childNodes)) await typeNode(root, targetEl);
    }

    function addMessage(role, text) {
      const w = document.createElement('div');
      w.className = 'msg-in w-full flex ' + (role === 'user' ? 'justify-end' : '');

      if (role === 'user') {
        w.innerHTML = `<div class="user-bubble">${escapeHtml(text).replace(/\n/g,'<br>')}</div>`;
        chatBox.appendChild(w);
        scrollToBottom();
      } else {
        w.innerHTML = `<div class="bot-capsule">
          <div class="bot-avatar">
            <img src="logo.png" alt="AI" class="w-full h-full object-cover" onerror="this.src='https://res.cloudinary.com/dxsja3wy5/image/upload/v1772863840/tab-icon.png'">
          </div>
          <div class="bot-content overflow-x-auto"></div>
        </div>`;
        chatBox.appendChild(w);
        return typeHTML(w.querySelector('.bot-content'), marked.parse(text));
      }
    }

    window.clearChat = () => { conversationHistory=[]; chatBox.innerHTML=''; addMessage('bot','Session cleared! Fresh start ready. 🚀'); };

    chatForm.addEventListener('submit', async e => {
      e.preventDefault();
      const val = chatInput.value.trim();
      if (!val || isProcessing) return;

      isProcessing = true; sendBtn.disabled = true; chatInput.disabled = true;
      chatInput.value = ''; chatInput.style.height = 'auto';

      addMessage('user', val);
      conversationHistory.push({ role:'user', text: val });
      setTyping(true);

      try {
        const res = await fetch(WORKER_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            query:       val,
            history:     conversationHistory.slice(-8),
            level:       selectedLevel,
            attempt:     selectedAttempt,
          }),
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        setTyping(false);
        const answer = data.answer || 'An error occurred. Please try again.';
        conversationHistory.push({ role:'model', text: answer });
        await addMessage('bot', answer);
      } catch (err) {
        setTyping(false);
        await addMessage('bot', '⚠️ Connection error. Please try again in a moment.');
        conversationHistory.pop();
      }

      isProcessing = false; sendBtn.disabled = false; chatInput.disabled = false; chatInput.focus();
    });

    setTimeout(() => chatInput.focus(), 500);
  </script>
</body>
</html>
